# YOLOv11-FCA 配置文件

# 模型配置
model:
  name: YOLOv11-FCA
  backbone: CSPDarknet
  neck: PANet
  head: DecoupledHead
  num_classes: 10  # 车辆、行人、交通标志等

  # FCA注意力配置
  fca:
    enabled: true
    reduction: 16
    locations: [backbone, neck]  # 在哪些位置添加FCA

# 训练配置
training:
  # 基本参数
  epochs: 100
  batch_size: 16
  imgsz: 640
  workers: 8
  patience: 20        # 早停：20轮不提升就停止，防止过拟合
  
  # 优化器
  optimizer: SGD
  lr0: 0.001          # 初始学习率（降低，防止过拟合）
  lrf: 0.01           # 最终学习率 (lr0 * lrf)
  momentum: 0.937
  weight_decay: 0.001 # 权重衰减（增加，防止过拟合）
  
  # 学习率调度
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  
  # 损失权重
  box: 7.5           # box loss gain
  cls: 0.5           # cls loss gain
  dfl: 1.5           # dfl loss gain
  
# 数据增强
augmentation:
  mosaic: 1.0        # mosaic augmentation probability
  mixup: 0.15        # mixup augmentation probability
  copy_paste: 0.0    # copy-paste augmentation probability
  
  # HSV增强
  hsv_h: 0.015       # hue增强
  hsv_s: 0.7         # saturation增强
  hsv_v: 0.4         # value增强
  
  # 空间增强
  degrees: 10.0      # 旋转角度
  translate: 0.1     # 平移
  scale: 0.5         # 缩放
  shear: 0.0         # 剪切
  perspective: 0.0   # 透视变换
  flipud: 0.0        # 上下翻转
  fliplr: 0.5        # 左右翻转

# 数据集配置
dataset:
  train: data/datasets/traffic/train
  val: data/datasets/traffic/val
  test: data/datasets/traffic/test
  
  # 类别名称
  names:
    0: car
    1: truck
    2: bus
    3: motorcycle
    4: bicycle
    5: person
    6: traffic_light
    7: traffic_sign
    8: stop_sign
    9: parking_meter

# 验证配置
val:
  batch_size: 32
  conf_thres: 0.001   # 置信度阈值
  iou_thres: 0.7      # NMS IoU阈值
  max_det: 300        # 最大检测数

# 保存配置
save:
  dir: checkpoints/yolov11_fca
  period: 10          # 每隔多少epoch保存一次
  best_only: false    # 是否只保存最佳模型

# 日志配置
logging:
  tensorboard: true
  log_dir: results/logs/yolov11_fca
  print_interval: 10  # 打印间隔 (iterations)

# 设备配置
device: 0  # GPU ID，使用CPU设为'cpu'
