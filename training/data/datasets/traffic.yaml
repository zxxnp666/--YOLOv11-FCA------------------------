# 雾天交通目标检测数据集配置文件

# 数据集路径（相对于项目根目录）
path: training/data/datasets/traffic  # 数据集根目录
train: train/images  # 训练集图像目录
val: val/images      # 验证集图像目录
test: test/images    # 测试集图像目录

# 类别数量（根据你的实际类别修改）
nc: 10

# 类别名称（雾天交通场景常见类别）
names:
  0: car
  1: truck
  2: bus
  3: motorcycle
  4: bicycle
  5: person
  6: traffic_light
  7: traffic_sign
  8: stop_sign
  9: parking_meter

# 数据集说明
# 这是用于雾天交通目标检测的数据集
# 包含去雾后的图像和对应的标注
