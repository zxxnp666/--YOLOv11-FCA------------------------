# COCO 数据集配置（自动下载版本）
# ultralytics 会自动下载并配置 COCO 数据集

path: ../datasets/coco  # 数据集将下载到这里
train: train2017
val: val2017

# 下载链接（ultralytics 会自动处理）
download: |
  from ultralytics.data.utils import download
  dir = Path(yaml['path'])
  urls = ['http://images.cocodataset.org/zips/train2017.zip',
          'http://images.cocodataset.org/zips/val2017.zip',
          'http://images.cocodataset.org/annotations/annotations_trainval2017.zip']
  download(urls, dir=dir, curl=True)

nc: 80
